<!DOCTYPE html>
<html>
<head>
  <title>Redirecionando...</title>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// COLE SEUS DADOS REAIS DO FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_KEY_REAL",
  authDomain: "SEU_DOMINIO_REAL",
  projectId: "SEU_PROJECT_ID_REAL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// NÚMEROS SEM "+"
const numeros = [
"5563992356201",
"5563999911003",
"5563993018676",
"5563981172214",
"5563991037444",
"5563992506020",
"5563981017203",
"5563992629395",
"5563992062517",
"5563981196482",
"5563992400353",
"5563992165175",
"5563981049003",
"5563992618445",
"556332141331",
"5563981057255"
];

async function redirecionar() {
  try {
    const ref = doc(db, "sistema", "contador");

    await runTransaction(db, async (transaction) => {
      const docSnap = await transaction.get(ref);

      let valor = docSnap.data().valor || 0;
      valor++;

      transaction.update(ref, { valor });

      let indice = valor % numeros.length;
      let numero = numeros[indice];

      window.location.href =
        `https://wa.me/${numero}?text=Olá%20vim%20do%20Instagram`;
    });
  } catch (erro) {
    console.error("Erro:", erro);
    alert("Erro ao conectar, tente novamente");
  }
}

redirecionar();
</script>

</body>
</html>
